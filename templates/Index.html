<!DOCTYPE html>
<html lang="hi" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="theme-color" content="#E87722" />
  <meta name="description" content="induifn sdf संस्था — यात्री मार्गदर्शन, सेवा, सहायता" />

  <!-- PWA — served from ROOT via Flask route -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="परिक्रमा" />
  <link rel="apple-touch-icon" href="{{ url_for('static', filename='images/logo.png') }}" />

  <title>परिक्रमा सेवा संस्था</title>

  <!-- CSS — Flask static folder -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>

  <!-- OFFLINE BANNER -->
  <div id="offline-banner">आप ऑफलाइन हैं — सभी जानकारी उपलब्ध है</div>

  <!-- TOP HEADER -->
  <header class="site-header">
    <div class="logo-area">
      <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Logo"
           onerror="this.style.display='none'">
      <div class="site-title">
        परिक्रमा सेवा संस्था
        <small>माँ नर्मदा</small>
      </div>
    </div>
    <div class="lang-switcher">
      <button class="lang-btn active" data-lang="hi">हिं</button>
      <button class="lang-btn" data-lang="en">EN</button>
      <button class="lang-btn" data-lang="mr">म</button>
      <button class="lang-btn" data-lang="gu">ગુ</button>
    </div>
  </header>

  <!-- PAGES (rendered by app.js) -->
  <div id="page-home"       class="page active"></div>
  <div id="page-gallery"    class="page"></div>
  <div id="page-seva"       class="page"></div>
  <div id="page-help"       class="page"></div>
  <div id="page-parikrama"  class="page"></div>

  <!-- BOTTOM NAVIGATION -->
  <nav class="bottom-nav">
    <button class="nav-item active" data-page="home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      <span>होम</span>
    </button>
    <button class="nav-item" data-page="gallery">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <circle cx="8.5" cy="8.5" r="1.5"/>
        <polyline points="21 15 16 10 5 21"/>
      </svg>
      <span>गैलरी</span>
    </button>
    <button class="nav-item" data-page="seva">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
      </svg>
      <span>सेवा</span>
    </button>
    <button class="nav-item" data-page="help">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/>
        <line x1="12" y1="17" x2="12.01" y2="17"/>
      </svg>
      <span>सहायता</span>
    </button>
    <button class="nav-item" data-page="parikrama">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/>
        <line x1="8" y1="2" x2="8" y2="18"/>
        <line x1="16" y1="6" x2="16" y2="22"/>
      </svg>
      <span>परिक्रमा</span>
    </button>
  </nav>

  <!-- JS — Flask static folder (MUST come before app.js) -->
  <script src="{{ url_for('static', filename='js/i18n.js') }}"></script>

  <!-- Pass Flask static base URL to JavaScript -->
  <script>
    // This gives app.js the correct base path for images
    window.STATIC_URL = "{{ url_for('static', filename='') }}";
  </script>

  <script src="{{ url_for('static', filename='js/app.js') }}"></script>

  <!-- Service Worker Registration (PWA) — sw.js served from root -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(reg => console.log('SW registered:', reg.scope))
          .catch(err => console.log('SW error:', err));
      });
    }
  </script>

</body>
</html>
